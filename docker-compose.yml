services:
  web:
    build:
      context: .
      target: dev
    container_name: trustpass-web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    command: pnpm dev -p 3000 -H 0.0.0.0
    restart: unless-stopped
